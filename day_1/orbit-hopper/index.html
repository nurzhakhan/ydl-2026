<!DOCTYPE html>
<html lang="kk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Orbit Hopper</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="game">
      <canvas id="canvas"></canvas>

      <!-- HUD поверх канваса во время игры -->
      <div id="hud" class="hidden">
        <div class="hud-item"><span data-i18n="best">Рекорд</span>: <span id="best">0</span></div>
        <div class="hud-item">★ <span id="currency">0</span></div>
        <div class="hud-item" id="lives">♥♥♥</div>
      </div>

      <!-- Крупный текущий счёт по центру сверху -->
      <div id="score-big" class="hidden"><span id="score">0</span></div>

      <!-- Переключатель языка (виден на всех экранах) -->
      <div id="lang-switch">
        <button data-lang="kk">ҚАЗ</button>
        <button data-lang="ru">РУС</button>
        <button data-lang="en">ENG</button>
      </div>

      <!-- Кнопка паузы (видна только во время игры; показывает game.js) -->
      <button id="pause-btn" class="hidden" aria-label="Пауза">❚❚</button>

      <!-- Управление музыкой: кнопка вкл/выкл + ползунок громкости -->
      <div id="audio-ctrl">
        <button id="music-toggle" aria-label="Музыка вкл/выкл">🔊</button>
        <input
          id="volume"
          type="range"
          min="0"
          max="100"
          value="40"
          aria-label="Громкость музыки"
        />
      </div>

      <!-- Стартовый экран -->
      <div id="start-screen" class="overlay">
        <h1>ORBIT&nbsp;HOPPER</h1>
        <p class="tagline" data-i18n-html="tagline">Орбитадан ажырау үшін экранды басыңыз.<br />Келесі планетаның тартылысын ұстап қал.</p>
        <button id="play-btn" class="btn" data-i18n="play">► Ойнау</button>
        <p class="hint" data-i18n-html="controlsHint">Басқару: шерту / тап / <kbd>Бос орын</kbd></p>
      </div>

      <!-- Экран проигрыша -->
      <div id="gameover-screen" class="overlay hidden">
        <h2 data-i18n="gameOver">Ұшу аяқталды</h2>
        <div class="stats">
          <div><span data-i18n="score">Ұпай</span>: <span id="final-score">0</span></div>
          <div><span data-i18n="jumps">Секірулер</span>: <span id="final-jumps">0</span></div>
          <div><span data-i18n="collected">Жиналған</span> ★: <span id="final-stars">0</span></div>
          <div><span data-i18n="best">Рекорд</span>: <span id="final-best">0</span></div>
        </div>
        <button id="retry-btn" class="btn" data-i18n="retry">↻ Қайтадан</button>
        <p class="hint" data-i18n-html="retryHint">немесе <kbd>Бос орын</kbd> басыңыз</p>
      </div>

      <!-- Экран паузы -->
      <div id="pause-screen" class="overlay hidden">
        <h2 data-i18n="paused">Пауза</h2>
        <button id="resume-btn" class="btn" data-i18n="resume">► Жалғастыру</button>
        <p class="hint" data-i18n-html="pauseHint">немесе <kbd>P</kbd> басыңыз</p>
      </div>
    </div>

    <!-- Сначала чистая логика, потом игра, которая её использует. -->
    <script src="physics.js"></script>
    <script src="game.js"></script>
  </body>
</html>
